<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>WreckCheck - Car Damage Detection</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
</head>
<body class="bg-light">
    <div class="container py-5">
        <h1 class="mb-4 text-center">WreckCheck - Car Damage Detection</h1>
        <form method="POST" enctype="multipart/form-data" class="mb-4 text-center">
            <input type="file" name="image" accept="image/*" required>
            <button type="submit" class="btn btn-primary">Upload & Predict</button>
        </form>
        {% if filename %}
        <div class="text-center mb-3">
            <img src="/static/uploads/{{ filename }}" alt="Uploaded Image" style="max-width:300px;">
        </div>
        {% endif %}
        {% if prediction %}
        <div class="alert alert-success text-center">
            <strong>Prediction:</strong> {{ prediction }}
        </div>
        {% endif %}
    </div>
</body>
</html>
